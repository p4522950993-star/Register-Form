<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Registration</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

body {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg, #00c6ff, #00ff9d);
}

.container {
  width: 90%;
  max-width: 400px;
  background: #f4f4f4;
  padding: 25px;
  border-radius: 20px;
  text-align: center;
  box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

h2 {
  margin-bottom: 10px;
}

.divider {
  height: 6px;
  width: 100%;
  background: #ccc;
  border-radius: 10px;
  margin: 10px 0 20px;
}

input, select {
  width: 100%;
  padding: 12px;
  margin: 8px 0;
  border-radius: 12px;
  border: 1px solid #ccc;
  outline: none;
  font-size: 14px;
}

.terms {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  margin: 15px 0;
  white-space: nowrap;
}

.terms input {
  width: auto;
}

.buttons {
  display: flex;
  gap: 10px;
  margin-top: 10px;
}

button {
  flex: 1;
  padding: 12px;
  border: none;
  border-radius: 12px;
  color: white;
  font-size: 15px;
  cursor: pointer;
}

.submit {
  background: linear-gradient(135deg, #00c6ff, #00ff9d);
}

.reset {
  background: linear-gradient(135deg, #00ff9d, #00c6ff);
}

.dark-btn {
  width: 100%;
  margin-top: 15px;
  background: #2d4373;
}

.dark {
  background: #1e1e1e;
  color: white;
}

.dark input, .dark select {
  background: #333;
  color: white;
  border: 1px solid #555;
}

.dark .container {
  background: #2a2a2a;
}

</style>
</head>

<body>

<div class="container">
  <h2>🚀 Smart Registration</h2>
  <div class="divider"></div>

  <form id="form">
    <input type="text" placeholder="Full Name *" required>
    <input type="email" placeholder="Email *" required>
    <input type="tel" placeholder="Phone *" required>

    <select required>
      <option value="">Country *</option>
      <option>India</option>
      <option>USA</option>
      <option>UK</option>
    </select>

    <input type="password" placeholder="Password *" required>
    <input type="password" placeholder="Confirm Password *" required>

    <!-- FIXED TERMS -->
    <div class="terms">
      <input type="checkbox" id="terms" required>
      <label for="terms">Accept Terms & Conditions</label>
    </div>

    <div class="buttons">
      <button type="submit" class="submit">🚀 Submit</button>
      <button type="reset" class="reset">♻ Reset</button>
    </div>
  </form>

  <button class="dark-btn" onclick="toggleDark()">🌙 Dark Mode</button>
</div>

<script>
function toggleDark() {
  document.body.classList.toggle("dark");
}

document.getElementById("form").addEventListener("submit", function(e) {
  let pass = document.querySelectorAll("input[type='password']")[0].value;
  let confirm = document.querySelectorAll("input[type='password']")[1].value;

  if(pass !== confirm){
    alert("Passwords do not match!");
    e.preventDefault();
  }
});
</script>

</body>
</html>
