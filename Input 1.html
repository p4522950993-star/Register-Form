<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blue Registration Form</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg, #00c6ff, #0072ff); /* BLUE GRADIENT */
}

.container {
  text-align: center;
  width: 90%;
  max-width: 350px;
}

h1 {
  margin-bottom: 20px;
  color: white;
}

.form-group {
  margin-bottom: 15px;
  text-align: left;
}

label {
  color: #e0f0ff;
  font-size: 14px;
}

input {
  width: 100%;
  padding: 12px;
  margin-top: 5px;
  border: none;
  border-radius: 10px;
  background: rgba(0, 0, 50, 0.6); /* bluish dark */
  color: white;
  font-size: 16px;
  outline: none;
}

input::placeholder {
  color: #cce6ff;
}

input:focus {
  box-shadow: 0 0 8px #00c6ff;
}

button {
  margin-top: 10px;
  padding: 10px 20px;
  border: none;
  border-radius: 5px;
  background: #ffffff;
  color: #0072ff;
  font-size: 16px;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background: #0072ff;
  color: white;
}
</style>

</head>
<body>

<div class="container">
  <h1>Register</h1>

  <form>
    <div class="form-group">
      <label>Name:</label>
      <input type="text" placeholder="Enter your name" required>
    </div>

    <div class="form-group">
      <label>Email:</label>
      <input type="email" placeholder="Enter your email" required>
    </div>

    <button type="submit">Register</button>
  </form>
</div>

</body>
</html>
